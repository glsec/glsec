name: Check CI Catalog components

# Monthly freshness check for the popular GitLab CI Catalog component list that
# GL064 uses for typosquatting detection (rules/data/catalog_components.txt).
#
# GL064 only detects squats against components that are on the list, so a newly
# popular component that is missing is a detection gap. This job queries the
# GitLab GraphQL ciCatalogResources API (public, no token) for the most-starred
# components and opens an issue when:
#   - a component in the API top 40 is missing from the list (popular gap), or
#   - a list entry has dropped out of the API top 100 entirely (clearly stale).
# The 40/100 margins (the list holds ~60) keep boundary reshuffles from nagging.
# Updates are reviewed and regenerated by a human — the list is effectively a
# "legitimate/popular" allowlist, so a star-gamed squat must never be added
# automatically.

on:
  schedule:
    - cron: "0 8 1 * *" # 08:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check CI Catalog component list freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compare list against the most-starred catalog components
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          list_file="rules/data/catalog_components.txt"

          # Most-starred catalog components, in star order (GitLab caps a page at 100).
          query='{"query":"{ ciCatalogResources(sort: STAR_COUNT_DESC, first: 100) { nodes { fullPath } } }"}'
          curl -sS --max-time 60 -X POST https://gitlab.com/api/graphql \
            -H "Content-Type: application/json" -d "$query" \
            | jq -r '.data.ciCatalogResources.nodes[].fullPath' > api_all.txt

          # Guard against an API hiccup: a short/empty result would otherwise look
          # like every list entry was dropped and open a bogus issue.
          count=$(wc -l < api_all.txt)
          if [ "$count" -lt 50 ]; then
            echo "only $count catalog resources returned — treating as an API error" >&2
            exit 1
          fi

          grep -vE '^[[:space:]]*#|^[[:space:]]*$' "$list_file" \
            | tr -d '[:blank:]' | sort -u > list.txt
          head -40 api_all.txt | sort -u > api_top40.txt
          head -100 api_all.txt | sort -u > api_top100.txt

          missing_popular=$(comm -23 api_top40.txt list.txt || true)
          dropped=$(comm -23 list.txt api_top100.txt || true)

          if [ -z "$missing_popular" ] && [ -z "$dropped" ]; then
            echo "Catalog component list is up to date."
            exit 0
          fi

          title="GL064: CI Catalog component list may be stale"
          if [ "$(gh issue list --state open --search "\"$title\" in:title" --json number --jq 'length')" != "0" ]; then
            echo "An open issue for this already exists; skipping."
            exit 0
          fi

          {
            echo "The popular-component list GL064 uses for typosquatting detection (\`$list_file\`) has drifted from the most-starred GitLab CI Catalog components."
            echo
            if [ -n "$missing_popular" ]; then
              echo "**Popular components missing from the list** (in the API top 40 — a detection gap):"
              echo
              echo "$missing_popular" | sed 's/^/- /'
              echo
            fi
            if [ -n "$dropped" ]; then
              echo "**List entries no longer in the API top 100** (candidates to drop):"
              echo
              echo "$dropped" | sed 's/^/- /'
              echo
            fi
            echo "Regenerate \`$list_file\` from the GitLab GraphQL \`ciCatalogResources\` API (sort: \`STAR_COUNT_DESC\`) and review the diff before committing — the list is a legitimate/popular allowlist, so verify no entry is itself a typosquat."
          } > body.md

          gh issue create --title "$title" --label "enhancement" --body-file body.md
