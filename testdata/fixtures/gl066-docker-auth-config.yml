stages:
  - build

variables:
  DOCKER_AUTH_CONFIG: '{"auths":{"registry.example.com":{"auth":"dXNlcjpwYXNz"}}}'

build:
  stage: build
  image: registry.example.com/builder:1.0.0
  script:
